<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e3a8a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="robots" content="noindex" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>APROVIVA Operaciones &mdash; Villa Valencia</title>
  <link rel="manifest" href="/aproviva-suite/manifest.webmanifest" />
  <link rel="icon" href="/aproviva-suite/icons/app-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/aproviva-suite/icons/app-icon.svg" />
  <link rel="stylesheet" href="/aproviva-suite/css/suite.css" />
</head>
<body>
  <div class="app-shell" id="app-shell" data-testid="suite-shell">
    <header class="app-header" id="app-header">
      <div class="app-header-main">
        <h1>APROVIVA Operaciones <span class="building" id="app-building">Villa Valencia</span></h1>
        <button class="btn-logout" id="app-logout" type="button" style="display:none;">Salir</button>
      </div>
      <div class="app-header-subline">
        <span class="role-badge" id="app-role-badge" style="display:none;">--</span>
        <span class="app-header-date" id="app-header-date"></span>
      </div>
    </header>
    <nav class="app-nav" id="app-nav" style="display:none;"></nav>
    <main class="app-content" id="app-content">
      <div class="loading">Cargando suite...</div>
    </main>
    <div id="suite-modal-host" class="suite-modal-host" aria-live="polite"></div>
  </div>

  <script src="/aproviva-suite/js/config.js"></script>
  <script src="/aproviva-suite/js/supabase.js"></script>
  <script src="/aproviva-suite/js/auth.js"></script>
  <script src="/aproviva-suite/js/ui.js"></script>
  <script src="/aproviva-suite/js/pwa.js"></script>
  <script src="/aproviva-suite/js/router.js"></script>
  <script src="/aproviva-suite/js/modules/login.js"></script>
  <script src="/aproviva-suite/js/modules/inicio.js"></script>
  <script src="/aproviva-suite/js/modules/inventario.js"></script>
  <script src="/aproviva-suite/js/modules/gemba.js"></script>
  <script src="/aproviva-suite/js/modules/mapa.js"></script>
  <script src="/aproviva-suite/js/modules/incidencias.js"></script>
  <script src="/aproviva-suite/js/modules/proyectos.js"></script>
  <script src="/aproviva-suite/js/modules/maestros.js"></script>
  <script src="/aproviva-suite/js/modules/reportes.js"></script>
  <script src="/aproviva-suite/js/modules/junta.js"></script>
  <script>
    document.getElementById('app-building').textContent = window.APROVIVA_SUITE_CONFIG.BUILDING_NAME + ' \u00b7 ' + window.APROVIVA_SUITE_CONFIG.BUILDING_CODE;
    (function () {
      var h = window.location.hash;
      if (!h || h === '#' || h === '#/') {
        window.location.hash = window.AUTH.readSession() ? '#/inicio' : '#/login';
      }
    })();
    window.ROUTER.start();
  </script>
</body>
</html>
