<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Mapa del conjunto — referencia PQRS | Villa Valencia</title>
  <link rel="stylesheet" href="css/suite.css" />
  <style>
    .map-embed-page { min-height: 100vh; display: flex; flex-direction: column; }
    .map-embed-header {
      background: var(--primary, #1e3a8a);
      color: #fff;
      padding: 0.85rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }
    .map-embed-header h1 { margin: 0; font-size: 1.05rem; font-weight: 600; }
    .map-embed-header a { color: #fff; opacity: 0.9; font-size: 0.88rem; }
    .map-embed-body { flex: 1; display: flex; flex-direction: column; padding: 0.75rem; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box; }
    .map-embed-note {
      font-size: 0.86rem;
      color: var(--text-soft, #475569);
      margin: 0 0 0.75rem;
      line-height: 1.45;
    }
    .vv-map-embed { flex: 1; min-height: 320px; height: min(65vh, 520px); border-radius: var(--radius, 14px); border: 1px solid var(--border, #e2e8f0); }
    .map-embed-error { padding: 1rem; color: var(--danger, #b91c1c); }
  </style>
</head>
<body class="map-embed-page">
  <header class="map-embed-header">
    <h1 id="embed-title">Mapa del conjunto</h1>
    <a href="../index.html">&larr; Volver al portal</a>
  </header>
  <div class="map-embed-body">
    <p class="map-embed-note">
      Vista de referencia (solo lectura): l&iacute;mite del conjunto, ruta de recorrido y puntos definidos por administraci&oacute;n.
      Usa el mismo criterio de <strong>ubicaci&oacute;n</strong> al radicar un <strong>PQRS</strong> en el portal.
    </p>
    <div id="vv-embed-map" role="application" aria-label="Mapa Villa Valencia"></div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/map-embed-config.js"></script>
  <script src="js/map-embed.js"></script>
  <script>
    (function () {
      var cfg = window.VV_MAP_EMBED_CONFIG || {};
      var t = document.getElementById('embed-title');
      if (t && cfg.BUILDING_NAME) t.textContent = 'Mapa del conjunto — ' + cfg.BUILDING_NAME;
      document.title = (cfg.BUILDING_NAME || 'Villa Valencia') + ' — mapa PQRS';
      if (window.VVMapEmbed) window.VVMapEmbed.init({ containerId: 'vv-embed-map' });
    })();
  </script>
</body>
</html>
